name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx tsc -b

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx vitest --run --coverage
      - name: Report coverage
        if: always()
        run: |
          set -eu
          node -e "
            const s = require('./coverage/coverage-summary.json').total;
            const lines = [
              '## Code Coverage',
              '',
              '| Metric | Coverage |',
              '|--------|----------|',
              '| **Statements** | **' + s.statements.pct + '%** |',
              '| Branches | ' + s.branches.pct + '% |',
              '| Functions | ' + s.functions.pct + '% |',
              '| Lines | ' + s.lines.pct + '% |',
              '',
              '> ' + s.lines.covered + '/' + s.lines.total + ' lines covered',
            ];
            console.log(lines.join('\n'));
          " >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
