name: Coverage PR Comment

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  pull-requests: write

jobs:
  comment:
    name: Post Coverage
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const head_sha = context.payload.workflow_run.head_sha;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head_sha,
            });
            if (prs.length === 0) {
              core.setOutput('number', '');
              return;
            }
            core.setOutput('number', prs[0].number);

      - name: Post coverage comment
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const t = summary.total;
            const pct = (m) => `${t[m].pct.toFixed(2)}%`;
            const prNumber = parseInt('${{ steps.pr.outputs.number }}', 10);
            const body = [
              '## Coverage Report',
              '',
              '| Metric | Coverage |',
              '|--------|----------|',
              `| Statements | ${pct('statements')} |`,
              `| Branches | ${pct('branches')} |`,
              `| Functions | ${pct('functions')} |`,
              `| Lines | ${pct('lines')} |`,
              '',
              `> ${t.lines.covered}/${t.lines.total} lines covered`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body?.startsWith('## Coverage Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
